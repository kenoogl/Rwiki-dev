feature_name: rwiki-v2-skill-library
constraints_count: 62
pairs_count: 48
constraints:
- requirement_id: '1.1'
  constraint_kind: scope
  constraint_text: standard skill を AGENTS/skills/<skill_name>.md という単一ディレクトリ配置とし、サブディレクトリによる分類を導入しない
- requirement_id: '1.2'
  constraint_kind: invariant
  constraint_text: skill 名を snake_case の ASCII 文字列とし、frontmatter name フィールドとファイル名（拡張子除く）が完全一致することを規定する
- requirement_id: '1.3'
  constraint_kind: conservatism
  constraint_text: skill ファイル名と frontmatter name が一致しない skill が存在する場合、ERROR severity
    で報告し、当該 skill を読み込み対象から除外する
- requirement_id: '1.4'
  constraint_kind: scope
  constraint_text: skill candidate を review/skill_candidates/<skill_name>.md に配置し、install
    を経て初めて AGENTS/skills/ に移動される
- requirement_id: '1.5'
  constraint_kind: conservatism
  constraint_text: skill 名の衝突が検出される場合、ERROR severity で操作を拒否し、改名または改版時の対処（同名 skill
    の上書き install は不可、改版時は新規 skill 名で install することを基本方針）を求める
- requirement_id: '2.1'
  constraint_kind: invariant
  constraint_text: すべての skill ファイルが 8 section を見出し（## レベル）として順に保持する
- requirement_id: '2.3'
  constraint_kind: conservatism
  constraint_text: skill ファイルに 8 section のうち 1 つでも欠落している場合、ERROR severity で報告し、当該
    skill の install を拒否する
- requirement_id: '2.4'
  constraint_kind: invariant
  constraint_text: Failure Conditions section を記述する場合、各 failure に対する「次のアクション」欄（再試行可否、人間判断要否、candidate
    廃棄の有無）を必須項目として規定する
- requirement_id: '2.5'
  constraint_kind: scope
  constraint_text: 8 section 以外の追加 section を任意で持つことを許容するが、validation 対象は 8 section
    のみである
- requirement_id: '3.2'
  constraint_kind: scope
  constraint_text: optional フィールドとして applicable_categories / applicable_input_paths
    / dialogue_guide / auto_save_dialogue を許容、許可値外の値は WARN severity で報告
- requirement_id: '3.3'
  constraint_kind: conservatism
  constraint_text: frontmatter が YAML として parse できない場合、ERROR severity で報告し、当該 skill
    を install / load の対象から除外する
- requirement_id: '3.4'
  constraint_kind: conservatism
  constraint_text: origin が standard / custom 以外、または update_mode が create / extend
    / both 以外、または status が定義 4 値以外である場合、ERROR severity で値域違反を報告
- requirement_id: '3.5'
  constraint_kind: scope
  constraint_text: skill ファイルの初期 install 時の status を必ず active とし、deprecated / retracted
    / archived への遷移は Spec 7 lifecycle 操作のみが行える
- requirement_id: '3.6'
  constraint_kind: scope
  constraint_text: Skill ファイルには update_history field を v2 MVP では適用しない。Skill lifecycle
    履歴は decision_log.jsonl の Skill 起源 4 種で網羅
- requirement_id: '4.2'
  constraint_kind: invariant
  constraint_text: 12 種の知識生成 skill それぞれが Requirement 2 の 8 section スキーマと Requirement
    3 の frontmatter スキーマを完全に満たす
- requirement_id: '4.3'
  constraint_kind: scope
  constraint_text: 知識生成 skill の出力先を review/synthesis_candidates/ 配下とし、各 candidate
    の target / update_type フィールドの取り扱いは Spec 1 所管
- requirement_id: '4.4'
  constraint_kind: conservatism
  constraint_text: ある content の type が既存 11 種の専門 skill のいずれにも該当しない場合、generic_summary
    を fallback として提供し、生成出力に WARN マーカーを付与して人間レビューを促す
- requirement_id: '5.4'
  constraint_kind: scope
  constraint_text: Graph 抽出 skill の出力先を review/relation_candidates/ 配下とし、Spec 5 が
    edges.jsonl / entities.yaml に永続化する前段の human reject filter を経由する
- requirement_id: '5.5'
  constraint_kind: invariant
  constraint_text: Graph 抽出 skill の出力 schema 自体（フィールド名・値域・必須性）を本 spec が SSoT として確定し、Spec
    5 が当該 schema を入力 contract として validation 実装する責務分離
- requirement_id: '5.6'
  constraint_kind: authority
  constraint_text: 本 spec が Graph 抽出 skill の出力 schema を変更する必要が生じた場合、変更を Spec 5 と先行合意した上でしか反映できない手順を採る
- requirement_id: '5.7'
  constraint_kind: conservatism
  constraint_text: Graph 抽出 skill の Failure Conditions section に schema validation
    不通過時は当該 entity / edge を candidate に採用せず ERROR で報告する旨を必須記載
- requirement_id: '6.3'
  constraint_kind: scope
  constraint_text: frontmatter_completion の出力を採用する場合、採用判断（提案採用 / 棄却 / 部分採用）が decision_log.jsonl
    に記録される対象である
- requirement_id: '6.4'
  constraint_kind: invariant
  constraint_text: 'frontmatter_completion を interactive: true として配布し、ユーザー対話による採否判断を前提とする'
- requirement_id: '7.4'
  constraint_kind: conservatism
  constraint_text: rw skill test 呼出時、成功時に candidate frontmatter dry_run_passed を true
    に更新。LLM CLI timeout / crash / 出力 schema 違反 / その他 dry-run 内部例外で失敗した場合、dry_run_passed
    を false のまま維持し、ERROR severity で失敗種別と原因を report
- requirement_id: '7.5'
  constraint_kind: invariant
  constraint_text: rw skill install <candidate> 呼出時、Requirement 9 の install validation
    を全件通過した場合に限り candidate を AGENTS/skills/<name>.md に移動し、frontmatter origin を custom、status
    を active、version を 1 に確定
- requirement_id: '7.6'
  constraint_kind: conservatism
  constraint_text: rw skill install 実行時に candidate の dry_run_passed が false である場合、ERROR
    severity で install を拒否し、Requirement 8 の dry-run 必須化を理由として提示
- requirement_id: '8.1'
  constraint_kind: invariant
  constraint_text: 'rw skill install <candidate> 実行前に、当該 candidate に対する rw skill test
    の成功実績（candidate frontmatter dry_run_passed: true）が最低 1 回存在することを必須要件として規定'
- requirement_id: '8.2'
  constraint_kind: conservatism
  constraint_text: candidate の最終修正以降に dry-run が再実行されていない場合、install を拒否し、再 dry-run
    を要求する
- requirement_id: '8.3'
  constraint_kind: invariant
  constraint_text: candidate ファイルが Validation 段階で修正される場合、修正と同時に frontmatter dry_run_passed
    を false にリセットする
- requirement_id: '8.4'
  constraint_kind: scope
  constraint_text: 'standard skill（origin: standard）の rw init 配布時には dry-run 必須化を適用しない（Rwiki
    配布側で品質保証済を前提とする）'
- requirement_id: '9.1'
  constraint_kind: invariant
  constraint_text: 'install 時に 4 種 validation を全て実行する: (a) 8 section 完備 / (b) YAML
    妥当 / (c) 名前衝突なし / (d) 参照整合性'
- requirement_id: '9.2'
  constraint_kind: conservatism
  constraint_text: 4 種 validation のいずれか 1 つでも失敗した場合、ERROR severity で install を拒否し、失敗した
    validation 種別と該当箇所を report する
- requirement_id: '9.3'
  constraint_kind: scope
  constraint_text: validation 失敗時に candidate ファイルを review/skill_candidates/ に残置し、ユーザーが修正後に再
    install を試行できる状態を保つ
- requirement_id: '9.4'
  constraint_kind: authority
  constraint_text: 'rw skill install を dangerous_op category: 中（推奨対話）として位置付け、validation
    通過後も install 直前に 1-stage confirm を経る'
- requirement_id: '9.5'
  constraint_kind: scope
  constraint_text: standard skill 配布（rw init）時にも同等の 4 種 validation を実行する（Rwiki 自体の配布パッケージ整合性検査として）
- requirement_id: '9.6'
  constraint_kind: invariant
  constraint_text: install operation を atomic に実行することを規定し、process kill / disk full
    / OOM 等で操作中断された場合は元の状態（candidate 残置 / AGENTS/skills/ 未配置）に復帰することを保証
- requirement_id: '10.1'
  constraint_kind: scope
  constraint_text: 'update_mode: create の skill が新規 wiki / synthesis ページを review/synthesis_candidates/
    に生成することのみを許容し、既存ページの差分出力を行わない'
- requirement_id: '10.2'
  constraint_kind: invariant
  constraint_text: 'update_mode: extend の skill が既存 wiki ページに対する差分（追記 / 修正）を HTML
    コメント形式の差分マーカーで囲んで出力する'
- requirement_id: '10.3'
  constraint_kind: scope
  constraint_text: 'update_mode: both の skill が新規生成と既存拡張の両方を出力可能とし、各候補ファイルの frontmatter
    update_type で create / extension / refactor / deprecation-reference 等を識別'
- requirement_id: '10.4'
  constraint_kind: invariant
  constraint_text: 'update_mode: extend の skill が出力する差分マーカーを記述する場合、開始マーカー（<!-- rw:extend:start
    ... -->）と終了マーカー（<!-- rw:extend:end -->）を必ず対で出力する'
- requirement_id: '10.5'
  constraint_kind: conservatism
  constraint_text: 'update_mode: extend skill 出力に開始マーカーまたは終了マーカーが欠落している場合、dry-run
    段階で ERROR severity で報告し、dry_run_passed を false のまま維持'
- requirement_id: '11.1'
  constraint_kind: scope
  constraint_text: 'origin: standard の skill を Rwiki 配布パッケージに同梱し、rw init 実行時に AGENTS/skills/
    に展開する'
- requirement_id: '11.2'
  constraint_kind: scope
  constraint_text: 'origin: custom の skill を rw init の配布対象から除外し、ユーザーが rw skill draft
    / test / install を経由してのみ追加できる'
- requirement_id: '11.3'
  constraint_kind: invariant
  constraint_text: standard skill の初期配布数を Requirement 4 / 5 / 6 の合計 15 種（知識生成 12 +
    Graph 抽出 2 + lint 支援 1）として固定
- requirement_id: '11.4'
  constraint_kind: invariant
  constraint_text: standard skill が install 後にユーザーによってファイル編集された場合、当該 skill の origin
    を custom に変更することなく standard のまま保持し、ユーザー編集は次回 rw init --reinstall 等の挙動仕様で扱う
- requirement_id: '11.5'
  constraint_kind: scope
  constraint_text: skill export / import を v2 MVP 外として位置付け、本 requirements で当該機能の振る舞いを規定しない
- requirement_id: '11.6'
  constraint_kind: conservatism
  constraint_text: rw init 配布完了後に standard skill 15 種が AGENTS/skills/ に揃っていることを配布完整性
    check として検証し、generic_summary を含む不在 skill があれば ERROR を発行する
- requirement_id: '12.1'
  constraint_kind: scope
  constraint_text: review/skill_candidates/<name>.md frontmatter 必須フィールドを name / base
    / status / dry_run_passed として規定。status 値域は draft / validated の 2 値（drafts §5.7
    が記述する approved 値は本 spec では採用しない）
- requirement_id: '12.4'
  constraint_kind: scope
  constraint_text: 'candidate が install 完了によって AGENTS/skills/ に移動された時、当該 candidate
    ファイルを review/skill_candidates/ から削除する。履歴は decision_log.jsonl の decision_type:
    skill_install で保全'
- requirement_id: '12.5'
  constraint_kind: conservatism
  constraint_text: candidate frontmatter の必須 4 フィールドのいずれかが欠落・型違反している場合、ERROR severity
    で当該 candidate を install 候補から除外
- requirement_id: '13.6'
  constraint_kind: scope
  constraint_text: rw skill deprecate <name> / rw skill retract <name> を Spec 7 lifecycle
    所管とし、本 spec では当該 subcommand 名の存在のみを認知し振る舞いを規定しない
- requirement_id: '13.7'
  constraint_kind: scope
  constraint_text: rw skill 各 subcommand の引数 parse / 出力整形 / exit code を規定する場合、当該責務を
    Spec 4 所管とし、本 spec は内部の振る舞い契約のみを所管
- requirement_id: '13.8'
  constraint_kind: invariant
  constraint_text: write 系の rw skill 操作（rw skill draft / rw skill test / rw skill
    install）の実行時に Foundation Requirement 11.5 が規定する .rwiki/.hygiene.lock を取得することを
    Spec 4 への coordination 要求として明示。rw skill list / rw skill show は read-only 操作のため
    lock 取得対象外
- requirement_id: '14.1'
  constraint_kind: invariant
  constraint_text: 本 requirements の用語使用を Spec 0 Foundation の用語集 5 分類（特に Skill / Custom
    skill / Skill candidate / Review layer / Dry-run）と整合させ、独自の再定義・再命名を行わない
- requirement_id: '14.2'
  constraint_kind: scope
  constraint_text: 本 requirements を日本語で記述し、spec.json.language=ja および CLAUDE.md「All
    Markdown content written to project files MUST be written in the target language」要件に準拠
- requirement_id: '14.3'
  constraint_kind: scope
  constraint_text: 本文中で表形式を用いる場合、表は最小限に留め、長文・解説は表外の箇条書きまたは段落で記述
- requirement_id: '14.4'
  constraint_kind: invariant
  constraint_text: 本 requirements の各記述項目について SSoT 出典（drafts/rwiki-v2-consolidated-spec.md
    v0.7.12 §2.8 / §5.6 / §5.7 / §7.2 Spec 2 / §11.2）を辿れるよう参照点を残す
- requirement_id: '14.5'
  constraint_kind: scope
  constraint_text: SSoT が改版された場合に本 requirements の更新が必要となる時、自身の更新が roadmap.md「Adjacent
    Spec Synchronization」運用ルールに従い、spec.json.updated_at 更新と markdown 末尾 change log
    への追記で足りる
- requirement_id: '14.6'
  constraint_kind: invariant
  constraint_text: 本 requirements が定める 15 個の Requirement の各々について、design 段階で Boundary
    Commitments として境界が再確認されることを前提とする
- requirement_id: '15.2'
  constraint_kind: scope
  constraint_text: 対話ログ markdown フォーマットの詳細仕様（Turn 表現の内部構造、auto-save の append 単位、speaker
    / content / timestamp 等の Turn 内部 schema、対話ログ保存先の命名規則とディレクトリ構造、frontmatter 任意フィールドの拡張規約）を
    design phase 持ち越し項目として位置付け
- requirement_id: '15.4'
  constraint_kind: invariant
  constraint_text: 対話ログを生成または依拠する skill（interactive_synthesis / frontmatter_completion
    / llm_log_extract 等）を扱う場合、当該 skill ファイルの Output section または Input section に対話ログ
    frontmatter スキーマへの参照点を必須記載
- requirement_id: '15.5'
  constraint_kind: invariant
  constraint_text: 対話ログ frontmatter スキーマを本 spec が SSoT として確定し、Spec 4（Requirement 1.8
    が定める保存実装と保存先 path 規約）/ Spec 6（保存タイミングと append 単位の trigger 起票時に確認）が当該スキーマに従う責務分離を明示。本スキーマを変更する必要が生じた場合は
    Adjacent Spec Synchronization 運用ルールに従い波及同期
