    constraint_kind: conservatism
    constraint_text: 'Graph 抽出 skill の Failure Conditions section に schema validation 不通過時は当該 entity / edge を candidate に採用せず ERROR で報告する旨を必須記載'

  - id: '6.1'
    summary: 'lint 支援 1 種 frontmatter_completion を origin: standard 初期配布'
    location: 'requirements.md:154'
    constraint_kind: normal
    constraint_text: 'lint 支援 skill として frontmatter_completion を origin: standard で初期配布する'
  - id: '6.2'
    summary: 'frontmatter_completion Input/Output section 規定'
    location: 'requirements.md:155'
    constraint_kind: normal
    constraint_text: 'frontmatter_completion skill の Input section に lint FAIL となった markdown ファイルパスと FAIL 理由 を必須入力として規定し、Output section に補完提案 frontmatter（YAML 文字列）と確信度 を出力フォーマットとして規定する'
  - id: '6.3'
    summary: '採用判断 (採用 / 棄却 / 部分採用) は decision_log.jsonl 記録対象'
    location: 'requirements.md:156'
    constraint_kind: scope
    constraint_text: 'frontmatter_completion の出力を採用する場合、採用判断（提案採用 / 棄却 / 部分採用）が decision_log.jsonl に記録される対象である'
  - id: '6.4'
    summary: 'frontmatter_completion を interactive: true として配布 (ユーザー対話採否前提)'
    location: 'requirements.md:157'
    constraint_kind: invariant
    constraint_text: 'frontmatter_completion を interactive: true として配布し、ユーザー対話による採否判断を前提とする'

  - id: '7.1'
    summary: 'custom skill 作成 7 段階対話フロー (意図確認 / 情報収集 / 草案生成 / Validation / Dry-run / 修正ループ / Install)'
    location: 'requirements.md:165'
    constraint_kind: normal
    constraint_text: 'custom skill 作成を 7 段階の対話フローとして規定する'
  - id: '7.2'
    summary: 'rw skill draft <name> 呼出時 candidate 新規生成、status: draft / dry_run_passed: false 初期値'
    location: 'requirements.md:173'
    constraint_kind: normal
    constraint_text: 'rw skill draft <name> が呼び出された場合、review/skill_candidates/<name>.md を新規生成し、status: draft / dry_run_passed: false を frontmatter 初期値として設定'
  - id: '7.3'
    summary: 'rw skill draft <name> --base 既存 skill template 複製 + base 記録'
    location: 'requirements.md:174'
    constraint_kind: normal
    constraint_text: 'rw skill draft <name> --base <existing_skill> が呼び出された場合、既存 skill の 8 section を template として candidate に複製し、base: <existing_skill> を frontmatter に記録'
  - id: '7.4'
    summary: 'rw skill test 成功時 dry_run_passed=true 更新、failure 4 種 (timeout/crash/output_error/internal) で ERROR + dry_run_passed=false 維持'
    location: 'requirements.md:175'
    constraint_kind: conservatism
    constraint_text: 'rw skill test 呼出時、成功時に candidate frontmatter dry_run_passed を true に更新。LLM CLI timeout / crash / 出力 schema 違反 / その他 dry-run 内部例外で失敗した場合、dry_run_passed を false のまま維持し、ERROR severity で失敗種別と原因を report'
  - id: '7.5'
    summary: 'rw skill install <candidate> R9 install validation 全件通過時のみ移動 + origin=custom / status=active / version=1 確定'
    location: 'requirements.md:176'
    constraint_kind: invariant
    constraint_text: 'rw skill install <candidate> 呼出時、Requirement 9 の install validation を全件通過した場合に限り candidate を AGENTS/skills/<name>.md に移動し、frontmatter origin を custom、status を active、version を 1 に確定'
  - id: '7.6'
    summary: 'install 時 dry_run_passed=false → ERROR install 拒否 (R8 dry-run 必須化を理由)'
    location: 'requirements.md:177'
    constraint_kind: conservatism
    constraint_text: 'rw skill install 実行時に candidate の dry_run_passed が false である場合、ERROR severity で install を拒否し、Requirement 8 の dry-run 必須化を理由として提示'
  - id: '7.7'
    summary: 'custom skill サブカテゴリも同じ 7 段階フローで作成可能'
    location: 'requirements.md:178'
    constraint_kind: normal
    constraint_text: 'custom skill のサブカテゴリ（Scenario 35 由来の reject 学習 skill 等）も同じ 7 段階フローで作成可能とする'

  - id: '8.1'
    summary: 'install 前 dry_run_passed=true 最低 1 回必須'
    location: 'requirements.md:186'
    constraint_kind: invariant
    constraint_text: 'rw skill install <candidate> 実行前に、当該 candidate に対する rw skill test の成功実績（candidate frontmatter dry_run_passed: true）が最低 1 回存在することを必須要件として規定'
  - id: '8.2'
    summary: '最終修正以降 dry-run 未再実行 → install 拒否 + 再 dry-run 要求'
    location: 'requirements.md:187'
    constraint_kind: conservatism
    constraint_text: 'candidate の最終修正以降に dry-run が再実行されていない場合、install を拒否し、再 dry-run を要求する'
  - id: '8.3'
    summary: '修正と同時に dry_run_passed=false reset (修正後の再 dry-run 強制)'
    location: 'requirements.md:188'
    constraint_kind: invariant
    constraint_text: 'candidate ファイルが Validation 段階で修正される場合、修正と同時に frontmatter dry_run_passed を false にリセットする'
  - id: '8.4'
    summary: 'standard skill rw init 配布時には dry-run 必須化を適用しない (品質保証済前提)'
    location: 'requirements.md:189'
    constraint_kind: scope
    constraint_text: 'standard skill（origin: standard）の rw init 配布時には dry-run 必須化を適用しない（Rwiki 配布側で品質保証済を前提とする）'

  - id: '9.1'
    summary: 'install 時 4 種 validation 全実行 (8 section / YAML / 衝突 / 参照整合性)'
    location: 'requirements.md:197'
    constraint_kind: invariant
    constraint_text: 'install 時に 4 種 validation を全て実行する: (a) 8 section 完備 / (b) YAML 妥当 / (c) 名前衝突なし / (d) 参照整合性'
  - id: '9.2'
    summary: '4 種 validation いずれか 1 つでも失敗 → ERROR install 拒否 + 失敗種別と該当箇所 report'
    location: 'requirements.md:202'
    constraint_kind: conservatism
    constraint_text: '4 種 validation のいずれか 1 つでも失敗した場合、ERROR severity で install を拒否し、失敗した validation 種別と該当箇所を report する'
  - id: '9.3'
    summary: 'validation 失敗時 candidate を review/skill_candidates/ 残置 + 修正後再 install 可能'
    location: 'requirements.md:203'
    constraint_kind: scope
    constraint_text: 'validation 失敗時に candidate ファイルを review/skill_candidates/ に残置し、ユーザーが修正後に再 install を試行できる状態を保つ'
  - id: '9.4'
    summary: 'rw skill install を dangerous_op 中 (推奨対話) + install 直前 1-stage confirm'
    location: 'requirements.md:204'
    constraint_kind: authority
    constraint_text: 'rw skill install を dangerous_op category: 中（推奨対話）として位置付け、validation 通過後も install 直前に 1-stage confirm を経る'
  - id: '9.5'
    summary: 'standard skill 配布 (rw init) 時にも同等 4 種 validation 実行'
    location: 'requirements.md:205'
    constraint_kind: scope
    constraint_text: 'standard skill 配布（rw init）時にも同等の 4 種 validation を実行する（Rwiki 自体の配布パッケージ整合性検査として）'
  - id: '9.6'
    summary: 'install operation atomic 実行 + 中断時元の状態復帰'
    location: 'requirements.md:206'
    constraint_kind: invariant
    constraint_text: 'install operation を atomic に実行することを規定し、process kill / disk full / OOM 等で操作中断された場合は元の状態（candidate 残置 / AGENTS/skills/ 未配置）に復帰することを保証'

  - id: '10.1'
    summary: 'update_mode: create skill = 新規 wiki / synthesis ページ生成のみ、既存ページ差分出力不可'
    location: 'requirements.md:214'
    constraint_kind: scope
    constraint_text: 'update_mode: create の skill が新規 wiki / synthesis ページを review/synthesis_candidates/ に生成することのみを許容し、既存ページの差分出力を行わない'
  - id: '10.2'
    summary: 'update_mode: extend skill = 既存ページ差分を HTML コメント形式の差分マーカーで囲んで出力'
    location: 'requirements.md:215'
    constraint_kind: invariant
    constraint_text: 'update_mode: extend の skill が既存 wiki ページに対する差分（追記 / 修正）を HTML コメント形式の差分マーカーで囲んで出力する'
  - id: '10.3'
    summary: 'update_mode: both skill = 新規生成 / 既存拡張両出力可能、frontmatter update_type で識別'
    location: 'requirements.md:216'
    constraint_kind: scope
    constraint_text: 'update_mode: both の skill が新規生成と既存拡張の両方を出力可能とし、各候補ファイルの frontmatter update_type で create / extension / refactor / deprecation-reference 等を識別'
  - id: '10.4'
    summary: '差分マーカー = 開始 (rw:extend:start) + 終了 (rw:extend:end) 必ず対で出力'
    location: 'requirements.md:217'
    constraint_kind: invariant
    constraint_text: 'update_mode: extend の skill が出力する差分マーカーを記述する場合、開始マーカー（<!-- rw:extend:start ... -->）と終了マーカー（<!-- rw:extend:end -->）を必ず対で出力する'
  - id: '10.5'
    summary: '開始/終了マーカー欠落 → dry-run 段階で ERROR + dry_run_passed=false 維持'
    location: 'requirements.md:218'
    constraint_kind: conservatism
    constraint_text: 'update_mode: extend skill 出力に開始マーカーまたは終了マーカーが欠落している場合、dry-run 段階で ERROR severity で報告し、dry_run_passed を false のまま維持'

  - id: '11.1'
    summary: 'origin: standard skill を Rwiki 配布パッケージ同梱、rw init で AGENTS/skills/ 展開'
    location: 'requirements.md:226'
    constraint_kind: scope
    constraint_text: 'origin: standard の skill を Rwiki 配布パッケージに同梱し、rw init 実行時に AGENTS/skills/ に展開する'
  - id: '11.2'
    summary: 'origin: custom skill を rw init 配布対象から除外、ユーザー rw skill draft/test/install 経由のみ追加'
    location: 'requirements.md:227'
    constraint_kind: scope
    constraint_text: 'origin: custom の skill を rw init の配布対象から除外し、ユーザーが rw skill draft / test / install を経由してのみ追加できる'
  - id: '11.3'
    summary: 'standard skill 初期配布数 = 15 種 (知識生成 12 + Graph 抽出 2 + lint 支援 1) 固定'
    location: 'requirements.md:228'
    constraint_kind: invariant
    constraint_text: 'standard skill の初期配布数を Requirement 4 / 5 / 6 の合計 15 種（知識生成 12 + Graph 抽出 2 + lint 支援 1）として固定'
  - id: '11.4'
    summary: 'standard skill ユーザー編集後も origin 維持 (custom に変更しない)'
    location: 'requirements.md:229'
    constraint_kind: invariant
    constraint_text: 'standard skill が install 後にユーザーによってファイル編集された場合、当該 skill の origin を custom に変更することなく standard のまま保持し、ユーザー編集は次回 rw init --reinstall 等の挙動仕様で扱う'
  - id: '11.5'
    summary: 'skill export / import を v2 MVP 外として位置付け、振る舞い規定しない'
    location: 'requirements.md:230'
    constraint_kind: scope
    constraint_text: 'skill export / import を v2 MVP 外として位置付け、本 requirements で当該機能の振る舞いを規定しない'
  - id: '11.6'
    summary: 'rw init 配布完了後 standard 15 種揃っているか配布完整性 check + 不在で ERROR'
    location: 'requirements.md:231'
    constraint_kind: conservatism
    constraint_text: 'rw init 配布完了後に standard skill 15 種が AGENTS/skills/ に揃っていることを配布完整性 check として検証し、generic_summary を含む不在 skill があれば ERROR を発行する'

  - id: '12.1'
    summary: 'skill candidate frontmatter 必須 4 field (name / base / status [draft|validated] / dry_run_passed)、drafts §5.7 approved 値は不採用'
    location: 'requirements.md:239'
    constraint_kind: scope
    constraint_text: 'review/skill_candidates/<name>.md frontmatter 必須フィールドを name / base / status / dry_run_passed として規定。status 値域は draft / validated の 2 値（drafts §5.7 が記述する approved 値は本 spec では採用しない）'
  - id: '12.2'
    summary: 'candidate 新規生成時 status: draft / dry_run_passed: false 初期値'
    location: 'requirements.md:244'
    constraint_kind: normal
    constraint_text: 'candidate が新規生成される時、status: draft / dry_run_passed: false を初期値として設定'
  - id: '12.3'
    summary: 'validation 全件通過時 status: validated 更新'
    location: 'requirements.md:245'
    constraint_kind: normal
    constraint_text: 'validation（Requirement 9 の (a) - (d)）が全件通過した時、candidate frontmatter status を validated に更新'
  - id: '12.4'
    summary: 'install 完了時 candidate ファイルを review/skill_candidates/ から削除 (履歴は decision_log.jsonl skill_install で保全)'
    location: 'requirements.md:246'
    constraint_kind: scope
    constraint_text: 'candidate が install 完了によって AGENTS/skills/ に移動された時、当該 candidate ファイルを review/skill_candidates/ から削除する。履歴は decision_log.jsonl の decision_type: skill_install で保全'
  - id: '12.5'
    summary: 'candidate 必須 4 フィールド欠落・型違反 → ERROR install 候補から除外'
    location: 'requirements.md:247'
    constraint_kind: conservatism
    constraint_text: 'candidate frontmatter の必須 4 フィールドのいずれかが欠落・型違反している場合、ERROR severity で当該 candidate を install 候補から除外'

  - id: '13.1'
    summary: 'rw skill list = 全 skill の name / origin / status / version 返す read-only 操作'
    location: 'requirements.md:255'
    constraint_kind: normal
    constraint_text: 'rw skill list を「現存する全 skill の name / origin / status / version を返す」操作として規定'
  - id: '13.2'
    summary: 'rw skill show = 指定 skill の frontmatter + 8 section 本文返す read-only 操作'
    location: 'requirements.md:256'
    constraint_kind: normal
    constraint_text: 'rw skill show <name> を「指定 skill の frontmatter 全フィールドと 8 section の本文を返す」操作として規定'
  - id: '13.3'
    summary: 'rw skill draft = R7.2 / R7.3 振る舞い'
    location: 'requirements.md:257'
    constraint_kind: normal
    constraint_text: 'rw skill draft <name> [--base <skill>] を Requirement 7.2 / 7.3 の振る舞いとして規定'
  - id: '13.4'
    summary: 'rw skill test = R7.4 / R8 dry-run 振る舞い'
    location: 'requirements.md:258'
    constraint_kind: normal
    constraint_text: 'rw skill test <candidate-or-name> [--sample <file>] を Requirement 7.4 / Requirement 8 の dry-run 振る舞いとして規定'
  - id: '13.5'
    summary: 'rw skill install = R7.5 / R9 validation + 配置振る舞い'
    location: 'requirements.md:259'
    constraint_kind: normal
    constraint_text: 'rw skill install <candidate> を Requirement 7.5 / Requirement 9 の validation + 配置振る舞いとして規定'
  - id: '13.6'
    summary: 'rw skill deprecate / retract = Spec 7 lifecycle 所管、本 spec は subcommand 名認知のみ'
    location: 'requirements.md:260'
    constraint_kind: scope
    constraint_text: 'rw skill deprecate <name> / rw skill retract <name> を Spec 7 lifecycle 所管とし、本 spec では当該 subcommand 名の存在のみを認知し振る舞いを規定しない'
  - id: '13.7'
    summary: 'rw skill 引数 parse / 出力整形 / exit code は Spec 4 所管、本 spec は内部の振る舞い契約のみ'
    location: 'requirements.md:261'
    constraint_kind: scope
    constraint_text: 'rw skill 各 subcommand の引数 parse / 出力整形 / exit code を規定する場合、当該責務を Spec 4 所管とし、本 spec は内部の振る舞い契約のみを所管'
  - id: '13.8'
    summary: 'write 系 (draft / test / install) = .rwiki/.hygiene.lock 取得 (排他制御)、list / show は read-only 取得対象外'
    location: 'requirements.md:262'
    constraint_kind: invariant
    constraint_text: 'write 系の rw skill 操作（rw skill draft / rw skill test / rw skill install）の実行時に Foundation Requirement 11.5 が規定する .rwiki/.hygiene.lock を取得することを Spec 4 への coordination 要求として明示。rw skill list / rw skill show は read-only 操作のため lock 取得対象外'

  - id: '14.1'
    summary: '用語使用を Spec 0 Foundation 用語集 5 分類と整合 (再定義禁止)'
    location: 'requirements.md:270'
    constraint_kind: invariant
    constraint_text: '本 requirements の用語使用を Spec 0 Foundation の用語集 5 分類（特に Skill / Custom skill / Skill candidate / Review layer / Dry-run）と整合させ、独自の再定義・再命名を行わない'
  - id: '14.2'
    summary: '本 requirements を日本語で記述 (spec.json.language=ja 準拠)'
    location: 'requirements.md:271'
    constraint_kind: scope
    constraint_text: '本 requirements を日本語で記述し、spec.json.language=ja および CLAUDE.md「All Markdown content written to project files MUST be written in the target language」要件に準拠'
  - id: '14.3'
    summary: '表形式は最小限、長文・解説は表外の箇条書きまたは段落'
    location: 'requirements.md:272'
    constraint_kind: scope
    constraint_text: '本文中で表形式を用いる場合、表は最小限に留め、長文・解説は表外の箇条書きまたは段落で記述'
  - id: '14.4'
    summary: '各記述項目について SSoT 出典を辿れる参照点を残す'
    location: 'requirements.md:273'
    constraint_kind: invariant
    constraint_text: '本 requirements の各記述項目について SSoT 出典（drafts/rwiki-v2-consolidated-spec.md v0.7.12 §2.8 / §5.6 / §5.7 / §7.2 Spec 2 / §11.2）を辿れるよう参照点を残す'
  - id: '14.5'
    summary: 'SSoT 改版時 spec.json.updated_at 更新と change log 追記で足りる'
    location: 'requirements.md:274'
    constraint_kind: scope
    constraint_text: 'SSoT が改版された場合に本 requirements の更新が必要となる時、自身の更新が roadmap.md「Adjacent Spec Synchronization」運用ルールに従い、spec.json.updated_at 更新と markdown 末尾 change log への追記で足りる'
  - id: '14.6'
    summary: '15 個の Requirement の各々について design 段階で Boundary Commitments として境界再確認'
    location: 'requirements.md:275'
    constraint_kind: invariant
    constraint_text: '本 requirements が定める 15 個の Requirement の各々について、design 段階で Boundary Commitments として境界が再確認されることを前提とする'

  - id: '15.1'
    summary: '対話ログ markdown ファイル frontmatter 必須 5 field 固定 (type / session_id / started_at / ended_at / turns)'
    location: 'requirements.md:283'
    constraint_kind: normal
    constraint_text: '対話ログ markdown ファイル frontmatter 必須フィールドを以下 5 種として固定: type（固定値 dialogue_log）/ session_id / started_at / ended_at / turns'
  - id: '15.2'
    summary: '対話ログ markdown フォーマット詳細仕様を design phase 持ち越し、本 requirements は SSoT 出典への参照点のみ'
    location: 'requirements.md:284'
    constraint_kind: scope
    constraint_text: '対話ログ markdown フォーマットの詳細仕様（Turn 表現の内部構造、auto-save の append 単位、speaker / content / timestamp 等の Turn 内部 schema、対話ログ保存先の命名規則とディレクトリ構造、frontmatter 任意フィールドの拡張規約）を design phase 持ち越し項目として位置付け'
  - id: '15.3'
    summary: 'Skill frontmatter 任意 2 種 (dialogue_guide / auto_save_dialogue) 許容、interactive: true skill が動的質問生成 + 対話ログ自動保存を制御'
    location: 'requirements.md:285'
    constraint_kind: normal
    constraint_text: 'Skill frontmatter の任意フィールドとして dialogue_guide および auto_save_dialogue の 2 種を許容し、interactive: true の skill が動的質問生成および対話ログ自動保存を制御するためのメタデータであることを明示'
  - id: '15.4'
    summary: '対話ログを生成・依拠する skill = Output / Input section に対話ログ frontmatter スキーマ参照点を必須記載'
    location: 'requirements.md:286'
    constraint_kind: invariant
    constraint_text: '対話ログを生成または依拠する skill（interactive_synthesis / frontmatter_completion / llm_log_extract 等）を扱う場合、当該 skill ファイルの Output section または Input section に対話ログ frontmatter スキーマへの参照点を必須記載'
  - id: '15.5'
    summary: '対話ログ frontmatter スキーマを本 spec が SSoT として確定、Spec 4 / Spec 6 が当該スキーマに従う責務分離'
    location: 'requirements.md:287'
    constraint_kind: invariant
    constraint_text: '対話ログ frontmatter スキーマを本 spec が SSoT として確定し、Spec 4（Requirement 1.8 が定める保存実装と保存先 path 規約）/ Spec 6（保存タイミングと append 単位の trigger 起票時に確認）が当該スキーマに従う責務分離を明示。本スキーマを変更する必要が生じた場合は Adjacent Spec Synchronization 運用ルールに従い波及同期'

cross_references:
