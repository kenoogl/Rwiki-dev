requirements_index:
  - id: '1.1'
    summary: 'standard skill = AGENTS/skills/<skill_name>.md 単一ディレクトリ配置 (サブディレクトリなし)'
    location: 'requirements.md:61'
    constraint_kind: scope
    constraint_text: 'standard skill を AGENTS/skills/<skill_name>.md という単一ディレクトリ配置とし、サブディレクトリによる分類を導入しない'
  - id: '1.2'
    summary: 'skill 名 = snake_case ASCII、frontmatter name とファイル名完全一致'
    location: 'requirements.md:62'
    constraint_kind: invariant
    constraint_text: 'skill 名を snake_case の ASCII 文字列とし、frontmatter name フィールドとファイル名（拡張子除く）が完全一致することを規定する'
  - id: '1.3'
    summary: 'skill ファイル名と frontmatter name 不一致時 ERROR + 読み込み除外'
    location: 'requirements.md:63'
    constraint_kind: conservatism
    constraint_text: 'skill ファイル名と frontmatter name が一致しない skill が存在する場合、ERROR severity で報告し、当該 skill を読み込み対象から除外する'
  - id: '1.4'
    summary: 'skill candidate = review/skill_candidates/<skill_name>.md 配置'
    location: 'requirements.md:64'
    constraint_kind: scope
    constraint_text: 'skill candidate を review/skill_candidates/<skill_name>.md に配置し、install を経て初めて AGENTS/skills/ に移動される'
  - id: '1.5'
    summary: 'skill 名衝突時 ERROR + 上書き不可、改版時は新規 skill 名で install (version up は v2 MVP 外)'
    location: 'requirements.md:65'
    constraint_kind: conservatism
    constraint_text: 'skill 名の衝突が検出される場合、ERROR severity で操作を拒否し、改名または改版時の対処（同名 skill の上書き install は不可、改版時は新規 skill 名で install することを基本方針）を求める'

  - id: '2.1'
    summary: '8 section 順保持 (Purpose / Execution Mode / Prerequisites / Input / Output / Processing Rules / Prohibited Actions / Failure Conditions)'
    location: 'requirements.md:73'
    constraint_kind: invariant
    constraint_text: 'すべての skill ファイルが 8 section を見出し（## レベル）として順に保持する'
  - id: '2.2'
    summary: '各 section 役割定義 (Purpose / Execution Mode / Prerequisites / Input / Output / Processing Rules / Prohibited Actions / Failure Conditions)'
    location: 'requirements.md:74'
    constraint_kind: normal
    constraint_text: '各 section の役割を以下のとおり定義する'
  - id: '2.3'
    summary: '8 section いずれか欠落 → ERROR + install 拒否'
    location: 'requirements.md:83'
    constraint_kind: conservatism
    constraint_text: 'skill ファイルに 8 section のうち 1 つでも欠落している場合、ERROR severity で報告し、当該 skill の install を拒否する'
  - id: '2.4'
    summary: 'Failure Conditions section に「次のアクション」欄必須'
    location: 'requirements.md:84'
    constraint_kind: invariant
    constraint_text: 'Failure Conditions section を記述する場合、各 failure に対する「次のアクション」欄（再試行可否、人間判断要否、candidate 廃棄の有無）を必須項目として規定する'
  - id: '2.5'
    summary: '8 section 以外の追加 section 任意許容、validation 対象は 8 section のみ'
    location: 'requirements.md:85'
    constraint_kind: scope
    constraint_text: '8 section 以外の追加 section を任意で持つことを許容するが、validation 対象は 8 section のみである'

  - id: '3.1'
    summary: 'frontmatter 必須 7 field (name / origin / version / status / interactive / update_mode / handles_deprecated)'
    location: 'requirements.md:93'
    constraint_kind: normal
    constraint_text: 'skill frontmatter の必須フィールドを以下のとおり規定する: name / origin / version / status / interactive / update_mode / handles_deprecated'
  - id: '3.2'
    summary: 'optional 4 field 許容 (applicable_categories / applicable_input_paths / dialogue_guide / auto_save_dialogue)、許可値外は WARN'
    location: 'requirements.md:101'
    constraint_kind: scope
    constraint_text: 'optional フィールドとして applicable_categories / applicable_input_paths / dialogue_guide / auto_save_dialogue を許容、許可値外の値は WARN severity で報告'
  - id: '3.3'
    summary: 'YAML parse 不能 → ERROR + install/load 除外'
    location: 'requirements.md:104'
    constraint_kind: conservatism
    constraint_text: 'frontmatter が YAML として parse できない場合、ERROR severity で報告し、当該 skill を install / load の対象から除外する'
  - id: '3.4'
    summary: 'origin / update_mode / status 値域違反 → ERROR'
    location: 'requirements.md:105'
    constraint_kind: conservatism
    constraint_text: 'origin が standard / custom 以外、または update_mode が create / extend / both 以外、または status が定義 4 値以外である場合、ERROR severity で値域違反を報告'
  - id: '3.5'
    summary: 'install 時 status 必ず active、遷移は Spec 7 lifecycle のみ (本 spec で実装しない)'
    location: 'requirements.md:106'
    constraint_kind: scope
    constraint_text: 'skill ファイルの初期 install 時の status を必ず active とし、deprecated / retracted / archived への遷移は Spec 7 lifecycle 操作のみが行える'
  - id: '3.6'
    summary: 'Skill ファイル update_history field を v2 MVP で適用しない (decision_log で集約)'
    location: 'requirements.md:107'
    constraint_kind: scope
    constraint_text: 'Skill ファイルには update_history field を v2 MVP では適用しない。Skill lifecycle 履歴は decision_log.jsonl の Skill 起源 4 種で網羅'

  - id: '4.1'
    summary: '知識生成 12 種を origin: standard で初期配布 (paper_summary など)'
    location: 'requirements.md:115'
    constraint_kind: normal
    constraint_text: '知識生成 skill として 12 種を origin: standard で初期配布する'
  - id: '4.2'
    summary: '12 種すべて R2 8 section + R3 frontmatter スキーマ完全に満たす'
    location: 'requirements.md:128'
    constraint_kind: invariant
    constraint_text: '12 種の知識生成 skill それぞれが Requirement 2 の 8 section スキーマと Requirement 3 の frontmatter スキーマを完全に満たす'
  - id: '4.3'
    summary: '出力先 = review/synthesis_candidates/ 配下、target / update_type 取り扱いは Spec 1 所管'
    location: 'requirements.md:129'
    constraint_kind: scope
    constraint_text: '知識生成 skill の出力先を review/synthesis_candidates/ 配下とし、各 candidate の target / update_type フィールドの取り扱いは Spec 1 所管'
  - id: '4.4'
    summary: 'generic_summary fallback + WARN マーカー (人間レビュー促す)'
    location: 'requirements.md:130'
    constraint_kind: conservatism
    constraint_text: 'ある content の type が既存 11 種の専門 skill のいずれにも該当しない場合、generic_summary を fallback として提供し、生成出力に WARN マーカーを付与して人間レビューを促す'

  - id: '5.1'
