note: |-
  全 48 ペアについて constraint_text と design responsibilities / bool 値の対立構造を検査した結果、
  drift は検出されなかった。多くのペアは design.md の本文または responsibilities 内に
  該当 requirement の意図を明示記述しており (例: R5.6 authority "Spec 5 先行合意必須" は
